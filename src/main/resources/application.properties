# Application
spring.application.name=virality-engine

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/virality_db?TimeZone=UTC
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
server.port=8081

# Suppress null warnings
spring.jpa.properties.hibernate.create_empty_composites.enabled=true